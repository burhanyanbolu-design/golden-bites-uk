<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Golden Bites Confection Co. — Logo Options</title>
  <style>
    body { background:#0d0500; font-family: sans-serif; padding: 40px; }
    h1 { color: #C9A84C; margin-bottom: 8px; font-size:1.4rem; }
    p { color: rgba(255,255,255,0.4); margin-bottom: 40px; font-size:0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 32px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2); border-radius: 12px; padding: 40px; text-align: center; }
    .card h3 { color: rgba(255,255,255,0.5); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 24px; }
    .dark { background: #0d0500; border-radius: 8px; padding: 24px; display:inline-block; }
  </style>
</head>
<body>
  <h1>Golden Bites Confection Co. — Logo Options</h1>
  <p>6 new designs with the full brand name. Tell me which one you prefer.</p>
  <div class="grid">

    <!-- OPTION 1: Hexagon -->
    <div class="card">
      <div class="dark">
        <svg width="260" height="80" viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
          <polygon points="36,4 60,4 72,26 60,48 36,48 24,26" fill="#C9A84C"/>
          <polygon points="36,12 54,12 63,26 54,40 36,40 27,26" fill="#0d0500"/>
          <text x="48" y="31" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#C9A84C">GB</text>
          <text x="88" y="22" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#fff" letter-spacing="1">Golden Bites</text>
          <text x="88" y="40" font-family="Georgia,serif" font-size="12" fill="#C9A84C" letter-spacing="2">Confection Co.</text>
        </svg>
      </div>
      <h3>Option 1 — Hexagon</h3>
    </div>

    <!-- OPTION 2: Crown -->
    <div class="card">
      <div class="dark">
        <svg width="240" height="95" viewBox="0 0 240 95" xmlns="http://www.w3.org/2000/svg">
          <path d="M100,46 L108,26 L120,38 L132,26 L140,46 Z" fill="#C9A84C"/>
          <rect x="100" y="46" width="40" height="6" rx="1" fill="#C9A84C"/>
          <text x="120" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="bold" fill="#fff" letter-spacing="2">GOLDEN BITES</text>
          <line x1="55" y1="76" x2="185" y2="76" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
          <text x="120" y="90" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#C9A84C" letter-spacing="4">CONFECTION CO.</text>
        </svg>
      </div>
      <h3>Option 2 — Crown Crest</h3>
    </div>

    <!-- OPTION 3: Circular seal -->
    <div class="card">
      <div class="dark">
        <svg width="250" height="90" viewBox="0 0 250 90" xmlns="http://www.w3.org/2000/svg">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
          <circle cx="45" cy="45" r="30" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
          <text x="45" y="38" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#C9A84C" letter-spacing="1">GOLDEN</text>
          <text x="45" y="50" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#C9A84C" letter-spacing="1">BITES</text>
          <text x="45" y="62" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#C9A84C" opacity="0.6">EST. 2026</text>
          <text x="95" y="28" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#fff">Golden Bites</text>
          <line x1="95" y1="36" x2="245" y2="36" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
          <text x="95" y="52" font-family="Georgia,serif" font-size="13" fill="#C9A84C" letter-spacing="2">Confection Co.</text>
          <text x="95" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="2">PREMIUM FOOD AGENCY · UK</text>
        </svg>
      </div>
      <h3>Option 3 — Circular Seal</h3>
    </div>

    <!-- OPTION 4: Chocolate squares -->
    <div class="card">
      <div class="dark">
        <svg width="260" height="90" viewBox="0 0 260 90" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="18" width="16" height="16" rx="2" fill="#C9A84C"/>
          <rect x="28" y="18" width="16" height="16" rx="2" fill="#C9A84C" opacity="0.7"/>
          <rect x="10" y="36" width="16" height="16" rx="2" fill="#C9A84C" opacity="0.7"/>
          <rect x="28" y="36" width="16" height="16" rx="2" fill="#C9A84C" opacity="0.4"/>
          <text x="58" y="30" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#fff" letter-spacing="1">Golden Bites</text>
          <text x="58" y="50" font-family="Georgia,serif" font-size="13" fill="#C9A84C" letter-spacing="2">Confection Co.</text>
          <line x1="58" y1="56" x2="255" y2="56" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
          <text x="58" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="2">CHOCOLATE · SWEETS · NUTS · DRIED FRUITS</text>
        </svg>
      </div>
      <h3>Option 4 — Chocolate Squares</h3>
    </div>

    <!-- OPTION 5: Cocoa bean -->
    <div class="card">
      <div class="dark">
        <svg width="260" height="90" viewBox="0 0 260 90" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="38" cy="42" rx="18" ry="26" fill="#C9A84C" transform="rotate(-15,38,42)"/>
          <ellipse cx="38" cy="42" rx="10" ry="18" fill="#0d0500" transform="rotate(-15,38,42)"/>
          <line x1="30" y1="18" x2="46" y2="66" stroke="#C9A84C" stroke-width="1"/>
          <text x="68" y="30" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#fff" letter-spacing="1">Golden Bites</text>
          <text x="68" y="50" font-family="Georgia,serif" font-size="13" fill="#C9A84C" letter-spacing="2">Confection Co.</text>
          <line x1="68" y1="56" x2="255" y2="56" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
          <text x="68" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="2">PREMIUM UK FOOD AGENCY</text>
        </svg>
      </div>
      <h3>Option 5 — Cocoa Bean</h3>
    </div>

    <!-- OPTION 6: Luxury box -->
    <div class="card">
      <div class="dark">
        <svg width="220" height="100" viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="210" height="90" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
          <rect x="5" y="5" width="210" height="90" rx="4" fill="#C9A84C" opacity="0.04"/>
          <line x1="20" y1="20" x2="200" y2="20" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
          <line x1="20" y1="80" x2="200" y2="80" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
          <text x="110" y="42" text-anchor="middle" font-family="Georgia,serif" font-size="19" font-weight="bold" fill="#C9A84C" letter-spacing="2">GOLDEN BITES</text>
          <line x1="30" y1="50" x2="190" y2="50" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
          <text x="110" y="66" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#fff" letter-spacing="3">CONFECTION CO.</text>
          <text x="110" y="76" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#C9A84C" letter-spacing="3" opacity="0.6">UNITED KINGDOM</text>
        </svg>
      </div>
      <h3>Option 6 — Luxury Box</h3>
    </div>

  </div>
</body>
</html>
